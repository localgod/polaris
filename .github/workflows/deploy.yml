name: Deploy

on:
  # Automatically deploy when the Publish workflow completes successfully
  workflow_run:
    workflows: ["Publish"]
    types: [completed]

  # Allow manual deploys from the GitHub Actions UI (always deploys latest)
  workflow_dispatch:

# Prevent concurrent deploys; do not cancel in-progress — let them finish
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    # For manual deploys, only allow runs from main.
    # For workflow_run triggers, only proceed when publish succeeded.
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Copy compose file
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: polaris
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: infra/docker-compose.yml
          target: /opt/polaris/infra/
          overwrite: true
          debug: true

      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: polaris
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            # Move compose file uploaded by scp-action into the expected location
            mv /opt/polaris/infra/docker-compose.yml /opt/polaris/docker-compose.yml

            # Write production .env from GitHub secrets
            cat > /opt/polaris/.env << ENV
            # Neo4j connection (plain vars for migrator, NUXT_ vars for app runtimeConfig)
            NEO4J_URI=${{ secrets.NEO4J_URI }}
            NEO4J_USERNAME=${{ secrets.NEO4J_USERNAME }}
            NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }}
            NUXT_NEO4J_URI=${{ secrets.NEO4J_URI }}
            NUXT_NEO4J_AUTH_USERNAME=${{ secrets.NEO4J_USERNAME }}
            NUXT_NEO4J_AUTH_PASSWORD=${{ secrets.NEO4J_PASSWORD }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_ORIGIN=${{ secrets.AUTH_ORIGIN }}
            AUTH_TRUST_HOST=true
            GITHUB_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.OAUTH_CLIENT_SECRET }}
            SUPERUSER_EMAILS=${{ secrets.SUPERUSER_EMAILS }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            ENV

            chmod 600 /opt/polaris/.env

            cd /opt/polaris

            # Pull new image and restart stack
            docker compose pull
            docker compose up -d --wait

            # Run database migrations
            docker compose pull migrate
            docker compose run --rm migrate npm run migrate:up
