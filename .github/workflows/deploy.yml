name: Deploy

on:
  # Automatically deploy when the Publish workflow completes successfully
  workflow_run:
    workflows: ["Publish"]
    types: [completed]

  # Allow manual deploys from the GitHub Actions UI (always deploys latest)
  workflow_dispatch:

# Prevent concurrent deploys; do not cancel in-progress — let them finish
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    # For manual deploys, only allow runs from main.
    # For workflow_run triggers, only proceed when publish succeeded.
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: read

    steps:
      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: polaris
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e

            # Write compose file inline (avoids scp-action dependency on pre-existing target dir)
            cat > /opt/polaris/docker-compose.yml << 'COMPOSE'
            services:
              app:
                image: ${DOCKERHUB_USERNAME}/polaris:latest
                restart: unless-stopped
                env_file: .env
                depends_on:
                  neo4j:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/ping"]
                  interval: 15s
                  timeout: 5s
                  retries: 3
                  start_period: 15s
                networks:
                  - polaris-net

              neo4j:
                image: neo4j:5-community
                restart: unless-stopped
                environment:
                  NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
                  NEO4J_PLUGINS: '["apoc"]'
                  NEO4J_dbms_security_procedures_unrestricted: apoc.*
                  NEO4J_server_memory_heap_initial__size: 256m
                  NEO4J_server_memory_heap_max__size: 512m
                  NEO4J_server_memory_pagecache_size: 256m
                volumes:
                  - /opt/polaris/data/neo4j/data:/data
                  - /opt/polaris/data/neo4j/logs:/logs
                  - /opt/polaris/data/neo4j/import:/var/lib/neo4j/import
                  - /opt/polaris/data/neo4j/plugins:/plugins
                healthcheck:
                  test: ["CMD", "bash", "-c", "wget -qO- http://127.0.0.1:7474 > /dev/null 2>&1 && (echo > /dev/tcp/127.0.0.1/7687) 2>/dev/null"]
                  interval: 15s
                  timeout: 15s
                  retries: 20
                  start_period: 120s
                networks:
                  - polaris-net

              migrate:
                image: ${DOCKERHUB_USERNAME}/polaris-migrator:latest
                env_file: .env
                depends_on:
                  neo4j:
                    condition: service_healthy
                networks:
                  - polaris-net
                profiles:
                  - migrate

              caddy:
                image: caddy:2-alpine
                restart: unless-stopped
                env_file: .env
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - /opt/polaris/Caddyfile:/etc/caddy/Caddyfile:ro
                  - caddy_data:/data
                  - caddy_config:/config
                depends_on:
                  app:
                    condition: service_healthy
                  dozzle:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 15s
                networks:
                  - polaris-net

              dozzle:
                image: amir20/dozzle:latest
                restart: unless-stopped
                volumes:
                  - /var/run/docker.sock:/var/run/docker.sock:ro
                  - /opt/polaris/dozzle:/data
                environment:
                  DOZZLE_NO_ANALYTICS: "true"
                  DOZZLE_AUTH_PROVIDER: simple
                healthcheck:
                  test: ["CMD", "/dozzle", "healthcheck"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                  start_period: 10s
                networks:
                  - polaris-net

            networks:
              polaris-net:
                driver: bridge
                enable_ipv6: true

            volumes:
              caddy_data:
              caddy_config:
            COMPOSE

            # Write Caddyfile (no basicauth — auth is handled by Dozzle natively)
            cat > /opt/polaris/Caddyfile << 'CADDYFILE'
            polaris.mindfield.dk {
                reverse_proxy app:3000
            }

            logs.mindfield.dk {
                reverse_proxy dozzle:8080
            }
            CADDYFILE

            # Write production .env from GitHub secrets
            cat > /opt/polaris/.env << ENV
            # Neo4j connection (plain vars for migrator, NUXT_ vars for app runtimeConfig)
            NEO4J_URI=${{ secrets.NEO4J_URI }}
            NEO4J_USERNAME=${{ secrets.NEO4J_USERNAME }}
            NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }}
            NUXT_NEO4J_URI=${{ secrets.NEO4J_URI }}
            NUXT_NEO4J_AUTH_USERNAME=${{ secrets.NEO4J_USERNAME }}
            NUXT_NEO4J_AUTH_PASSWORD=${{ secrets.NEO4J_PASSWORD }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_ORIGIN=${{ secrets.AUTH_ORIGIN }}
            AUTH_TRUST_HOST=true
            GITHUB_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.OAUTH_CLIENT_SECRET }}
            SUPERUSER_EMAILS=${{ secrets.SUPERUSER_EMAILS }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            GITHUB_TOKEN=${{ secrets.POLARIS_GITHUB_TOKEN }}
            ENV

            chmod 600 /opt/polaris/.env

            # Generate Dozzle users.yml using the official generate command
            mkdir -p /opt/polaris/dozzle
            docker run --rm amir20/dozzle generate ${{ secrets.DOZZLE_USER }} \
              --password '${{ secrets.DOZZLE_PASSWORD }}' \
              --name '${{ secrets.DOZZLE_USER }}' \
              > /opt/polaris/dozzle/users.yml
            chmod 600 /opt/polaris/dozzle/users.yml

            cd /opt/polaris

            # Pull new image and restart stack
            docker compose pull
            docker compose up -d

            # Wait for app to be healthy (up to 3 minutes), bypassing
            # docker compose up --wait which misreads start_period state.
            echo "Waiting for app to become healthy..."
            APP_HEALTHY=false
            for i in $(seq 1 36); do
              STATUS=$(docker inspect polaris-app-1 --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
              echo "  [${i}/36] app health: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                APP_HEALTHY=true
                break
              fi
              sleep 5
            done

            if [ "$APP_HEALTHY" = "false" ]; then
              echo ""
              echo "=== DEPLOY FAILED: app container never became healthy ==="
              echo ""
              echo "--- App container logs (last 150 lines) ---"
              docker compose logs app --tail=150 2>&1 || true
              echo ""
              echo "--- Health check history ---"
              docker inspect polaris-app-1 --format='{{range .State.Health.Log}}ExitCode={{.ExitCode}} Output={{.Output}}---{{end}}' 2>&1 || true
              echo ""
              echo "--- Container state ---"
              docker inspect polaris-app-1 --format='Status={{.State.Status}} ExitCode={{.State.ExitCode}} Error={{.State.Error}}' 2>&1 || true
              exit 1
            fi

            echo "App is healthy, proceeding."

            # Run database migrations
            docker compose pull migrate
            docker compose run --rm migrate npm run migrate:up
