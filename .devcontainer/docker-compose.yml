services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/polaris:cached
    command: sleep infinity
    network_mode: host
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/devpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      # Rotate Neo4j internal log files: keep 7 files, max 20MB each
      NEO4J_server_logs_debug_rotation_keep__number: 7
      NEO4J_server_logs_debug_rotation_size: 20m
      NEO4J_server_logs_user_rotation_keep__number: 7
      NEO4J_server_logs_user_rotation_size: 20m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ../.data/neo4j/data:/data
      - ../.data/neo4j/logs:/logs
      - ../.data/neo4j/import:/var/lib/neo4j/import
      - ../.data/neo4j/plugins:/plugins
    network_mode: host
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "devpassword", "RETURN 1"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 60s
