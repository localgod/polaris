services:
  app:
    image: ${DOCKERHUB_USERNAME}/polaris:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - polaris-net

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_dbms_memory_pagecache_size: 256m
    volumes:
      - /opt/polaris/data/neo4j/data:/data
      - /opt/polaris/data/neo4j/logs:/logs
      - /opt/polaris/data/neo4j/import:/var/lib/neo4j/import
      - /opt/polaris/data/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - polaris-net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/polaris/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - polaris-net

networks:
  polaris-net:
    driver: bridge
    enable_ipv6: true

volumes:
  caddy_data:
  caddy_config:
