services:
  app:
    image: ${DOCKERHUB_USERNAME}/polaris:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - polaris-net

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache__size: 256m
      # Rotate Neo4j internal log files: keep 7 files, max 20MB each
      NEO4J_server_logs_debug_rotation_keep__number: 7
      NEO4J_server_logs_debug_rotation_size: 20m
      NEO4J_server_logs_user_rotation_keep__number: 7
      NEO4J_server_logs_user_rotation_size: 20m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - /opt/polaris/data/neo4j/data:/data
      - /opt/polaris/data/neo4j/logs:/logs
      - /opt/polaris/data/neo4j/import:/var/lib/neo4j/import
      - /opt/polaris/data/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 60s
    networks:
      - polaris-net

  migrate:
    image: ${DOCKERHUB_USERNAME}/polaris-migrator:latest
    env_file: .env
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - polaris-net
    profiles:
      - migrate

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/polaris/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
      dozzle:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - polaris-net

  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/polaris/dozzle:/data
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_AUTH_PROVIDER: simple
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - polaris-net

  socket-proxy:
    image: tecnativa/docker-socket-proxy
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      ALLOW_STOP: 1
      ALLOW_RESTARTS: 1
    networks:
      - socket-proxy-net

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    environment:
      DOCKER_HOST: tcp://socket-proxy:2375
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_POLL_INTERVAL: "86400"
      WATCHTOWER_CLEANUP: "true"
    depends_on:
      - socket-proxy
    networks:
      - polaris-net
      - socket-proxy-net

networks:
  polaris-net:
    driver: bridge
    enable_ipv6: true
  socket-proxy-net:
    driver: bridge
    internal: true

volumes:
  caddy_data:
  caddy_config:
